# HomeHub v2 — E2E Test workflow
#
# Runs Playwright E2E tests on every push to `master`.
# PRD §15.2 / ARCHITECTURE.md §6: "E2E tests run on merge to master"
#
# Prerequisites (GitHub Secrets):
#   VITE_SUPABASE_URL            — Supabase project URL (test project)
#   VITE_SUPABASE_ANON_KEY       — Supabase anon key (test project)
#   SUPABASE_SERVICE_ROLE_KEY    — Service role key for seeding test data
#   TEST_USER_EMAIL              — Primary test user email
#   TEST_USER_PASSWORD           — Primary test user password
#   TEST_PARTNER_EMAIL           — Partner test user email
#   TEST_PARTNER_PASSWORD        — Partner test user password
#   BASE_URL                     — URL of the deployed preview/staging app

name: E2E Tests

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allow manual runs

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_PARTNER_EMAIL: ${{ secrets.TEST_PARTNER_EMAIL }}
          TEST_PARTNER_PASSWORD: ${{ secrets.TEST_PARTNER_PASSWORD }}
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test videos and screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
